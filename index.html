<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body>
  <!-- Page should be a dynamic webpage using flexbox to separate the main areas -->
  <!-- Heading central to the page -->
  <!-- Instructions, top left of page -->
  <!-- Options, Bottom left of page -->
  <!-- Option 1 - Drop-down box - URL, Text, email, phone, SMS, Wi-Fi, vCard. This will only display relevant fields to be completed for the user to complete, use URL as default -->
  <!-- use https://QR_generator.ndyl.uk as the default field -->
  <!-- Option 2 - Radio button for corner style - square, dot, rounded, use square as default -->
  <!-- Option 3 - Radio button for dot style - square, dot, rounded, use square as default -->
  <!-- Option 4 - Slider for Error correction - Low, Medium, Quartile, High, use Low as default -->
  <!-- Option 5 - Main colour selector with colour picker, use #112557 as default -->
  <!-- Option 6 - Gradient colour option, selector with colour picker, use #fd9802 as default -->
  <!-- Option 7 - Upload image, drag and drop or select from folder.  Use logo.png by default, include a radio button to not include a logo -->
  <!-- Option 8 - Slider to select image size -->
  <!-- Generate code button below option selection -->
  <!-- QR Code should be shown on the right of the page in the middle. The QR code should open with the QR code for https://QR_generator.ndyl.uk and the logo.png by default.
  
  <div id="header"></div>

  <main class="landing">
    <div class="logo-container">
      <img src="svg/logo.svg" alt="Logo" onerror="this.src='img/logo.png'" class="logo" />
    </div>
    <h1>QR Code |Generator</h1>
    <p>The default QR code is for this website, try it now.</p>
    <p>1. Select the QR code type from the drop-down list (URL, Text, email, phone, SMS, Wi-Fi, vCard)</p>
    <p>2. Select the QR Code style</p>
    <p>3. Select the QR error correction</p>
    <p>4. Select the colours for the QR Code
    <p>5. Option: add an image</p>
    <p>6. Select the image size (limited by error correction)</p>
    <p>7. Press the 'Generate QR Code' button</p>

  </main>

  <div id="footer"></div>
  <script src="js/header-footer-loader.js"></script>
</body>
</html>
